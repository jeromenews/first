name: Check Daydream Vinyl Restock

on:
  schedule:
    # Every 10 minutes.
    - cron: "*/10 * * * *"
  workflow_dispatch: {}   # manual "Run workflow" button (also keeps it alive)

permissions:
  contents: write         # needed so the job can save the lineup fingerprint

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run restock check
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python monitor.py

      - name: Save updated lineup fingerprint
        run: |
          if [ -n "$(git status --porcelain lineup_state.json)" ]; then
            git config user.name "restock-bot"
            git config user.email "restock-bot@users.noreply.github.com"
            git add lineup_state.json
            git commit -m "Update product lineup fingerprint"
            git push
          else
            echo "No lineup change to commit."
          fi
